name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    name: EAS Build (Android APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract project zip (if present)
        run: |
          if [ -f QuestHabits-Final-6.zip ]; then
            echo "Found QuestHabits-Final-6.zip — extracting into repo root"
            unzip -o billkhata.zip -d _extracted
            if [ -d _extracted/QuestHabits-Final-6]; then
              cp -r _extracted/QuestHabits-Final-6/. .
            else
              cp -r _extracted/. .
            fi
            rm -rf _extracted QuestHabits-Final-6.zip
          else
            echo "No QuestHabits-Final-6.zip found, assuming files are already at repo root"
          fi

      - name: Sanity check — confirm app.json exists at root
        run: test -f app.json && echo "app.json found, structure looks correct" || (echo "app.json missing at repo root — check the zip's internal folder structure" && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK with EAS
        run: eas build --platform android --profile preview --non-interactive
        
