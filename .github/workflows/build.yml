name: Build QuestHabits APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Extract ZIP and setup files
        run: |
          ZIP=$(find . -name "*.zip" | head -1)
          echo "ZIP found: $ZIP"
          unzip -o "$ZIP" -d ./unzipped
          PKG=$(find ./unzipped -name "package.json" -not -path "*/node_modules/*" | head -1)
          echo "package.json at: $PKG"
          DIR=$(dirname "$PKG")
          echo "Moving from: $DIR"
          cp -r "$DIR"/. .
          echo "Root files:"
          ls -la
          cat package.json

      - name: Install Dependencies
        run: npm install --legacy-peer-deps --no-package-lock

      - name: EAS Login Check
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuestHabits-v1.0.0-APK
          path: '*.apk'
          retention-days: 30
          if-no-files-found: warn
